<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages + Actions 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 600px;
            margin: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 16px;
        }

        .badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .info {
            background: #f3f4f6;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .info p {
            color: #374151;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .info span {
            font-weight: 600;
            color: #667eea;
        }

        .status {
            padding: 12px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 0.95rem;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
        }

        .footer {
            margin-top: 24px;
            font-size: 0.8rem;
            color: #9ca3af;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .timestamp {
            margin-top: 16px;
            font-size: 0.75rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">✓ 部署成功</div>
        <h1>🚀 GitHub Pages + Actions</h1>
        <p style="color: #666; margin-bottom: 16px;">您的静态网站已成功通过 GitHub Pages 部署！</p>

        <div class="info">
            <p>📦 <span>部署方式：</span> GitHub Pages</p>
            <p>⚙️ <span>自动构建：</span> GitHub Actions</p>
            <p>🌍 <span>访问时间：</span> <span id="access-time"></span></p>
            <p>🔧 <span>部署状态：</span> <span id="deploy-status">在线运行中</span></p>
        </div>

        <div class="status success">
            ✅ GitHub Pages 托管正常<br>
            ✅ 通过 Actions 自动部署验证通过
        </div>

        <button onclick="showMessage()">点击测试交互功能</button>
        <div id="message" class="timestamp"></div>
        <div class="timestamp">
            部署时间戳: <span id="build-time"></span>
        </div>
        <div class="footer">
            Powered by GitHub Pages + Actions | 测试部署流程
        </div>
    </div>

    <script>
        // 显示访问时间
        document.getElementById('access-time').textContent = new Date().toLocaleString('zh-CN');

        // 模拟构建时间（可通过环境变量注入真实构建时间）
        document.getElementById('build-time').textContent = new Date().toISOString().slice(0, 19).replace('T', ' ');

        // 测试交互函数
        function showMessage() {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = '🎉 GitHub Actions 自动部署测试成功！<br>当前时间: ' + new Date().toLocaleString();
            msgDiv.style.color = '#10b981';
            msgDiv.style.marginTop = '12px';
        }

        // 页面加载完成后的额外检测
        window.addEventListener('load', function() {
            console.log('GitHub Pages 测试页面加载完成');
            // 可选：检测是否为 GitHub Pages 环境
            if (window.location.hostname.includes('github.io')) {
                console.log('✓ 确认运行在 GitHub Pages 环境中');
            }
        });
    </script>
</body>
</html>
